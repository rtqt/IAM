version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: infnova_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: infnova_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d infnova_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
